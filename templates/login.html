{% extends 'base.html' %}
{% block title %}Oohay Login{% endblock %}
{% block content %}
<main class="main-container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="padding: 2rem; width: 100%; max-width: 400px;">
        <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 1.5rem;">Sign In to Oohay</h2>
        {% if error %}
        <div style="background-color: #fdecea; color: var(--negative); padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; text-align: center;">
            {{ error }}
        </div>
        {% endif %}
        <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
            <div>
                <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
                <input type="text" id="username" name="username" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;">
            </div>
            <div>
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                <input type="password" id="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;">
            </div>
            <button type="submit" style="background-color: var(--primary-color); color: white; border: none; padding: 0.75rem; border-radius: 4px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 0.5rem;">Sign In</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Don't have an account? <a href="/register" style="color: var(--primary-color); font-weight: 600;">Sign Up</a>
        </div>
    </div>
</main>
{% endblock %}
