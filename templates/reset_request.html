{% extends "base.html" %}

{% block title %}Reset Password - Oohay!{% endblock %}

{% block content %}
<main class="main-container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <section class="card" style="width: 100%; max-width: 400px; padding: 2rem;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Reset Password</h2>
        <p style="margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            Enter your username/email below and we'll send you a password reset link.
        </p>
        
        <form action="/reset-request" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="form-group">
                <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Username / Email</label>
                <input type="text" id="email" name="email" required 
                       style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1rem;">
            </div>
            
            <button type="submit" class="search-btn" style="width: 100%; border-radius: 8px; padding: 0.75rem; margin-top: 0.5rem;">
                Send Reset Link
            </button>
        </form>
        
        {% if msg %}
        <div style="margin-top: 1.5rem; padding: 1rem; background-color: #e3f2fd; color: #0d47a1; border-radius: 8px; font-size: 0.9rem; text-align: center;">
            {{ msg }}
        </div>
        {% endif %}
        
        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="/login" style="color: var(--primary-color); font-weight: 600; font-size: 0.9rem;">Back to Login</a>
        </div>
    </section>
</main>
{% endblock %}
